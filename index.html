<!DOCTYPE html>

<title>Meredith Bay Webcam</title>

<style>

*{

    padding:0;
    box-sizing:border-box;

body{

.section{
    margin-top:30px;
}

.section h3{
    margin-bottom:10px;

.email{
    color:#7dd3fc;
    text-decoration:none;
    font-size:18px;

.email:hover{
    text-decoration:underline;

.footer{
    margin-top:50px;
    color:#b5c7d9;
    font-size:15px;
    line-height:1.7;

hr{
